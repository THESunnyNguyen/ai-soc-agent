schema: spec-driven

project:
  name: ai-soc-agent-lab
  description: AI-powered SOC agent that ingests alerts, runs structured
    investigations via runbooks, and surfaces results through Discord.
  language: Python 3.12+

stack:
  mcp_server: mcp Python SDK
  agent: anthropic Python SDK
  discord: discord.py
  validation: pydantic
  storage_early: JSON files (phases 1-3)
  storage_late: PostgreSQL via asyncpg (phase 4+)
  logging: structlog
  testing: pytest + pytest-asyncio
  containers: Docker + Docker Compose
  orchestration: k3s on OCI free tier (ARM A1)
  cicd: GitHub Actions

rules:
  - All async code must use asyncio (no threading)
  - Storage access must go through base.py interface only
  - Agent steps must be stateless; all state lives in workflow/state.py
  - Pydantic models required for all external data (alerts, events, enrichment)
  - No direct DB calls outside storage/ layer